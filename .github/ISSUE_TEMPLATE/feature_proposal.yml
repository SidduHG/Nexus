name: Feature proposal
description: Propose new scope that isn't already on the v0.1 WBS roadmap.
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Most planned work is already tracked as an issue under the `v0.1` milestone — check open
        and closed issues first. This template is for genuinely new scope, not something already
        covered. Nexus's scope is deliberately v0.1-only — no overnight loop, repo knowledge
        graph, or Personal Mode are planned, so a proposal reviving that scope should explain why
        it's worth reconsidering, not assume it's already on the roadmap.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: How does this fit the project's model?
      description: >
        Nexus is personal-first and self-hosted: no multi-tenancy, no shared hosting, no
        proxying/reselling of vendor credentials (see README.md's "Distribution principle").
        Explain how this proposal fits — or if it deliberately doesn't, why it's still worth doing.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of done
      description: How would we know this is complete? (acceptance criteria, not just "it works")
    validations:
      required: true
