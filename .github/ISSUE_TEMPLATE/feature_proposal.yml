name: Feature proposal
description: Propose new scope that isn't already on the WBS roadmap (v0.1-v0.4).
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Most planned work is already tracked as an issue with a `v0.1`-`v0.4` milestone — check
        open and closed issues first. This template is for genuinely new scope, not something
        already covered.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: How does this fit the project's model?
      description: >
        Nexus is personal-first and self-hosted: no multi-tenancy, no shared hosting, no
        proxying/reselling of vendor credentials (see README.md's "Distribution principle").
        Explain how this proposal fits — or if it deliberately doesn't, why it's still worth doing.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of done
      description: How would we know this is complete? (acceptance criteria, not just "it works")
    validations:
      required: true
